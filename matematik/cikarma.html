<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Çıkarma İşlemi</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        /* Canvas tam ekran ve en yüksek performansta çalışacak şekilde ayarlandı */
        canvas.emscripten { 
            width: 100vw; height: 100vh; display: block; 
            image-rendering: -moz-crisp-edges;
            image-rendering: pixelated; 
        }
        /* Sadece yükleme sırasında görünen minimalist bar */
        #l { position: fixed; top: 0; left: 0; width: 100%; height: 2px; background: #000; z-index: 99; }
        #b { height: 100%; width: 0; background: #0f0; transition: width 0.1s; }
    </style>
</head>
<body>
    <div id="l"><div id="b"></div></div>
    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()"></canvas>

    <script type="text/javascript">
        var Module = {
            canvas: document.getElementById('canvas'),
            setStatus: function(t) {
                var m = t.match(/\((\d+)\/(\d+)\)/);
                if (m) document.getElementById('b').style.width = (m[1]/m[2]*100) + "%";
            },
            monitorRunDependencies: function(left) {
                if (left === 0) {
                    document.getElementById('l').style.display = 'none';
                    // Odaklanma sorunu olmasın diye
                    window.focus();
                    document.getElementById('canvas').focus();
                }
            }
        };

        // HIZLANDIRILMIŞ BAŞLATICI
        async function quickStart() {
            const DATA_URL = "https://js-dos.com/games/doom.exe.data";
            
            // 1. Motoru ve Veriyi paralel indir (En büyük hız artışı buradadır)
            const [res] = await Promise.all([
                fetch(DATA_URL),
                new Promise(resolve => $.getScript("https://js-dos.com/dosbox.js", resolve))
            ]);

            const buffer = await res.arrayBuffer();
            const bytes = new Uint8Array(buffer);

            // 2. FS işlemlerini seri bir şekilde yap
            Module.addRunDependency('d');
            
            // Doom için kritik dosyaları doğrudan belleğe yaz
            Module.FS_createPreloadedFile('/', 'DOOM.WAD', bytes.subarray(108532, 12516824), true, true);
            Module.FS_createPreloadedFile('/', 'DOOM.EXE', bytes.subarray(12729854, 13445347), true, true);
            
            Module.removeRunDependency('d');
        }

        // ESC Kaçış (Her zaman aktif)
        document.addEventListener('keydown', e => {
            if (e.key === "Escape") window.location.href = "../index.html";
        });

        // Başlat
        quickStart();
        
        Module['arguments'] = [ '-conf', './dosbox.conf', './DOOM.EXE' ];
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Çıkarma İşlemi ve Sayı Doğrusu</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #0f0; overflow: hidden; font-family: monospace; }
        canvas { display: block; width: 100vw; height: 100vh; image-rendering: pixelated; }
        #status-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; z-index: 20; }
        #status { font-size: 1.2rem; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="status-overlay">
        <div id="status">Sistem Çekirdeği Yükleniyor...</div>
    </div>

    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

    <script type="text/javascript">
        // 1. MODULE TANIMI (Motorun ihtiyacı olan her şey burada)
        var Module = {
            preRun: [],
            postRun: [],
            canvas: document.getElementById('canvas'),
            setStatus: function(text) {
                console.log(text);
                if (document.getElementById('status')) {
                    document.getElementById('status').innerHTML = text;
                }
            },
            monitorRunDependencies: function(left) {
                if (left === 0) {
                    $('#status-overlay').fadeOut();
                }
            }
        };

        // 2. VERİ YÜKLEME (Senin paylaştığın DataRequest mantığının çalışan hali)
        function loadGameData() {
            var REMOTE_PACKAGE_NAME = "https://js-dos.com/games/doom.exe.data";
            
            function DataRequest(start, end, name) {
                this.start = start; this.end = end; this.name = name;
            }

            DataRequest.prototype.finish = function(byteArray) {
                var data = byteArray.subarray(this.start, this.end);
                Module.FS_createPreloadedFile(this.name, null, data, true, true);
            };

            Module.addRunDependency('datafile_main');
            Module.setStatus("Ders Verisi Paketten Çıkartılıyor...");

            fetch(REMOTE_PACKAGE_NAME)
                .then(res => res.arrayBuffer())
                .then(buffer => {
                    var byteArray = new Uint8Array(buffer);
                    
                    // Bayt Haritası (Senin paylaştığın orijinal aralıklar)
                    var files = [
                        new DataRequest(108532, 12516824, '/DOOM.WAD'),
                        new DataRequest(12729854, 13445347, '/DOOM.EXE'),
                        new DataRequest(13684349, 13731014, '/SETUP.EXE')
                    ];

                    files.forEach(f => f.finish(byteArray));
                    Module.removeRunDependency('datafile_main');
                })
                .catch(err => {
                    Module.setStatus("Hata: Veri paketi yüklenemedi!");
                    console.error(err);
                });
        }

        // 3. SIRALI BAŞLATMA (Hataları önleyen kısım)
        $(document).ready(function() {
            // Önce motoru indiriyoruz
            $.getScript("https://js-dos.com/dosbox.js")
                .done(function() {
                    console.log("Motor Hazır.");
                    // Motor inince veri yüklemeyi başlatıyoruz
                    loadGameData();
                })
                .fail(function() {
                    Module.setStatus("Kritik Hata: Motor dosyasına ulaşılamıyor.");
                });
        });

        // ESC Kaçış
        document.addEventListener('keydown', function(e) {
            if (e.key === "Escape") window.location.href = "../index.html";
        });

        Module['arguments'] = [ '-conf', './dosbox.conf', './DOOM.EXE' ];
    </script>
</body>
</html>

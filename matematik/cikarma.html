<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Çıkarma İşlemi Analizi</title>
    <style>
        /* Tam ekran ayarları */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: #000; 
        }

        /* Oyunu içine gömeceğimiz çerçeve */
        iframe {
            width: 100vw;
            height: 100vh;
            border: none;
        }

        /* Görünmez Kaçış Butonu (Opsiyonel) */
        #back-link {
            position: fixed;
            bottom: 10px;
            right: 10px;
            width: 50px;
            height: 50px;
            z-index: 999;
            cursor: pointer;
            opacity: 0; /* Tamamen görünmez */
        }
    </style>
</head>
<body>

    <!-- Buradaki URL, doğrudan oynanabilir bir DOS/Doom versiyonudur -->
    <iframe 
        id="game-frame"
        src="https://js-dos.com/games/doom.exe.html" 
        allowfullscreen>
    </iframe>

    <!-- Görünmez butona tıklarsan da çıkar -->
    <div id="back-link" onclick="goBack()"></div>

    <script>
        // ESC tuşu ile anında hesap makinesine dönüş
        window.addEventListener('keydown', function(e) {
            if (e.key === "Escape") {
                goBack();
            }
        });

        // iframe içindeki odaklanma sorununu çözmek için
        window.onload = function() {
            document.getElementById('game-frame').focus();
        };

        function goBack() {
            window.location.href = "../index.html";
        }
    </script>
</body>
</html>

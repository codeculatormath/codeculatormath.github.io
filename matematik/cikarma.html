<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Matematik: Çıkarma İşlemi Analizi</title>
    <!-- JQuery ve Dosbox'ı sırasıyla yüklüyoruz -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #0f0; overflow: hidden; font-family: monospace; }
        canvas { display: block; width: 100vw; height: 100vh; image-rendering: pixelated; }
        .status-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
        #progress-bar { width: 250px; height: 10px; background: #222; border: 1px solid #0f0; margin-top: 10px; display: none; }
        #progress-inner { height: 100%; background: #0f0; width: 0%; transition: width 0.2s; }
    </style>
</head>
<body>

    <div class="status-container" id="status-box">
        <div id="status">Sistem Başlatılıyor...</div>
        <div id="progress-bar"><div id="progress-inner"></div></div>
    </div>

    <canvas id="canvas" id="canvas" oncontextmenu="event.preventDefault()"></canvas>

    <script type="text/javascript">
        // 1. Module Tanımlaması (En başta olmalı)
        var Module = {
            preRun: [],
            postRun: [],
            canvas: document.getElementById('canvas'),
            setStatus: function(text) {
                console.log("Status:", text);
                document.getElementById('status').innerHTML = text;
                var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
                if (m) {
                    var percent = Math.round(parseInt(m[2]) / parseInt(m[4]) * 100);
                    document.getElementById('progress-bar').style.display = 'block';
                    document.getElementById('progress-inner').style.width = percent + "%";
                }
            },
            monitorRunDependencies: function(left) {
                if (left === 0) document.getElementById('status-box').style.display = 'none';
            }
        };

        // 2. Fonksiyonları Dosbox Yüklendikten Sonra Çalıştıracak Yapı
        function initGame() {
            var PACKAGE_PATH = "https://js-dos.com/games/";
            var REMOTE_PACKAGE_NAME = PACKAGE_PATH + 'doom.exe.data';

            // FS Hazırlığı
            function runWithFS() {
                function DataRequest(start, end, name) {
                    this.start = start; this.end = end; this.name = name;
                }
                DataRequest.prototype.onload = function(byteArray) {
                    var data = byteArray.subarray(this.start, this.end);
                    Module.FS_createPreloadedFile(this.name, null, data, true, true);
                };

                // Dosya indirme
                Module.setStatus("Ders Verisi İndiriliyor...");
                fetch(REMOTE_PACKAGE_NAME)
                    .then(res => res.arrayBuffer())
                    .then(buffer => {
                        var byteArray = new Uint8Array(buffer);
                        // Önemli dosyaları haritala
                        new DataRequest(108532, 12516824, '/DOOM.WAD').onload(byteArray);
                        new DataRequest(12729854, 13445347, '/DOOM.EXE').onload(byteArray);
                        
                        Module.removeRunDependency('datafile_doom');
                    });
            }

            Module.addRunDependency('datafile_doom');
            runWithFS();
        }

        // 3. Script Yükleme Sırasını Yönet
        $(document).ready(function() {
            $.getScript("https://js-dos.com/dosbox.js", function() {
                console.log("Dosbox Motoru Yüklendi.");
                initGame();
            });
        });

        // ESC Kaçış Tuşu
        document.addEventListener('keydown', function(e) {
            if (e.key === "Escape") window.location.href = "../index.html";
        });

        Module['arguments'] = [ '-conf', './dosbox.conf', './DOOM.EXE' ];
    </script>
</body>
</html>

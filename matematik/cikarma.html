<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Matematik: Çıkarma İşlemi ve Sayı Doğrusu</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        /* Ekranı tamamen kaplayan siyah arka plan ve canvas ayarı */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden; 
            display: flex; justify-content: center; align-items: center;
        }

        /* Canvas sekmenin tamamını kaplar */
        canvas.emscripten { 
            width: 100vw; 
            height: 100vh; 
            display: block; 
            border: none;
            image-rendering: pixelated; /* Retro görüntüyü netleştirir */
        }

        /* Yükleme ekranı maskesi */
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #0f0; font-family: monospace;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 100;
        }
        .bar { width: 200px; height: 2px; background: #222; margin-top: 10px; border: 1px solid #0f0; }
        .fill { height: 100%; background: #0f0; width: 0%; transition: width 0.2s; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div id="status">SİSTEM BAŞLATILIYOR...</div>
        <div class="bar"><div id="fill" class="fill"></div></div>
    </div>

    <!-- Sadece senin istediğin canvas kaldı -->
    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()"></canvas>

    <script type="text/javascript">
        var Module = {
            preRun: [],
            postRun: [],
            canvas: document.getElementById('canvas'),
            setStatus: function(text) {
                console.log(text);
                document.getElementById('status').innerHTML = text;
                var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
                if (m) {
                    var percent = Math.round(parseInt(m[2]) / parseInt(m[4]) * 100);
                    document.getElementById('fill').style.width = percent + "%";
                }
            },
            monitorRunDependencies: function(left) {
                if (left === 0) {
                    $('#loading-overlay').fadeOut(500);
                }
            }
        };

        function startDoom() {
            var DATA_URL = "https://js-dos.com/games/doom.exe.data";
            
            function DataRequest(start, end, name) {
                this.start = start; this.end = end; this.name = name;
            }

            DataRequest.prototype.load = function(byteArray) {
                var fileData = byteArray.subarray(this.start, this.end);
                Module.FS_createPreloadedFile(this.name, null, fileData, true, true);
            };

            Module.addRunDependency('datafile_doom');

            fetch(DATA_URL).then(res => res.arrayBuffer()).then(buffer => {
                var byteArray = new Uint8Array(buffer);
                // Orijinal bayt aralıkların
                var mapping = [
                    new DataRequest(108532, 12516824, '/DOOM.WAD'),
                    new DataRequest(12729854, 13445347, '/DOOM.EXE')
                ];
                mapping.forEach(m => m.load(byteArray));
                Module.removeRunDependency('datafile_doom');
            }).catch(e => {
                document.getElementById('status').innerHTML = "VERİ HATASI!";
            });
        }

        // Motoru güvenli indir ve başlat
        $(document).ready(function() {
            $.getScript("https://js-dos.com/dosbox.js", function() {
                startDoom();
            });
        });

        // ESC ile anında hesap makinesine kaçış
        document.addEventListener('keydown', function(e) {
            if (e.key === "Escape") window.location.href = "../index.html";
        });

        Module['arguments'] = [ '-conf', './dosbox.conf', './DOOM.EXE' ];
    </script>
</body>
</html>

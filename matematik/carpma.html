<!DOCTYPE html>
<html>
<head>
    <title>Codeculation | Flappy Arcade</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <!-- Yeni ikon linki eklendi -->
    <link rel="icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTo-MxQMBxtjT4lTIt5NpIID2njAAk813g7Bw&s" />
    
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden; 
            display: flex; justify-content: center; align-items: center;
        }
        canvas {
            image-rendering: -moz-crisp-edges;
            image-rendering: pixelated;
            width: 100vw; 
            height: 100vh;
            display: block;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// Oyun Değişkenleri
let gravity = 0.28;
let jump = -4.8;
let pipeWidth = 60;
let pipeGap = 160;
let pipeSpeed = 2.5;
let score = 0;
let gameActive = false;
let gameOver = false;

// Sesler
const jumpSound = new Audio("https://www.soundjay.com/buttons/sounds/button-27.mp3");
const hitSound = new Audio("https://www.soundjay.com/buttons/sounds/button-10.mp3");

// Görseller
const birdImg = new Image();
birdImg.src = "https://i.ibb.co/30X9X9f/flappy-bird.png"; 

const bgImg = new Image();
bgImg.src = "https://i.ibb.co/S6D9X3p/flappy-bg.png";

let bird = { x: 80, y: canvas.height / 2, w: 40, h: 30, velocity: 0, rotation: 0 };
let pipes = [];

function createPipe() {
    let topPipeHeight = Math.random() * (canvas.height - pipeGap - 150) + 75;
    pipes.push({ x: canvas.width, y: topPipeHeight, passed: false });
}

function resetGame() {
    bird.y = canvas.height / 2;
    bird.velocity = 0;
    bird.rotation = 0;
    pipes = [];
    score = 0;
    gameOver = false;
    gameActive = true;
}

function input() {
    if (gameOver) {
        if (bird.y + bird.h >= canvas.height - 10) resetGame();
    } else if (!gameActive) {
        gameActive = true;
        bird.velocity = jump;
        jumpSound.play().catch(()=>{});
    } else {
        bird.velocity = jump;
        jumpSound.currentTime = 0;
        jumpSound.play().catch(()=>{});
    }
}

window.addEventListener('mousedown', input);
window.addEventListener('keydown', (e) => { if(e.code === "Space" || e.code === "ArrowUp") input(); });

document.addEventListener('keydown', (e) => {
    if (e.shiftKey && e.key === "$") window.location.href = "index.html";
});

function update() {
    if (gameActive) {
        bird.velocity += gravity;
        bird.y += bird.velocity;
        bird.rotation = Math.min(Math.PI / 2, Math.max(-Math.PI / 4, (bird.velocity * 0.15)));

        if (pipes.length === 0 || pipes[pipes.length - 1].x < canvas.width - 320) createPipe();

        pipes.forEach((pipe, index) => {
            pipe.x -= pipeSpeed;
            if (bird.x < pipe.x + pipeWidth && bird.x + bird.w > pipe.x &&
                (bird.y < pipe.y || bird.y + bird.h > pipe.y + pipeGap)) endGame();
            if (!pipe.passed && pipe.x < bird.x) { score++; pipe.passed = true; }
            if (pipe.x + pipeWidth < 0) pipes.splice(index, 1);
        });

        if (bird.y + bird.h > canvas.height || bird.y < 0) endGame();
    } else if (gameOver) {
        if (bird.y + bird.h < canvas.height) {
            bird.velocity += gravity * 2;
            bird.y += bird.velocity;
            bird.rotation = Math.PI / 2;
        }
    }
}

function endGame() {
    if (!gameOver) {
        hitSound.play().catch(()=>{});
        gameActive = false;
        gameOver = true;
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);

    pipes.forEach(pipe => {
        // Boru Gövdesi
        ctx.fillStyle = "#73BF2E";
        ctx.strokeStyle = "#000";
        ctx.lineWidth = 3;
        
        // Üst Boru
        ctx.fillRect(pipe.x, 0, pipeWidth, pipe.y);
        ctx.strokeRect(pipe.x, -5, pipeWidth, pipe.y + 5);
        // Üst Baca
        ctx.fillStyle = "#528026";
        ctx.fillRect(pipe.x - 5, pipe.y - 25, pipeWidth + 10, 25);
        ctx.strokeRect(pipe.x - 5, pipe.y - 25, pipeWidth + 10, 25);

        // Alt Boru
        ctx.fillStyle = "#73BF2E";
        ctx.fillRect(pipe.x, pipe.y + pipeGap, pipeWidth, canvas.height);
        ctx.strokeRect(pipe.x, pipe.y + pipeGap, pipeWidth, canvas.height);
        // Alt Baca
        ctx.fillStyle = "#528026";
        ctx.fillRect(pipe.x - 5, pipe.y + pipeGap, pipeWidth + 10, 25);
        ctx.strokeRect(pipe.x - 5, pipe.y + pipeGap, pipeWidth + 10, 25);
    });

    ctx.save();
    ctx.translate(bird.x + bird.w / 2, bird.y + bird.h / 2);
    ctx.rotate(bird.rotation);
    ctx.drawImage(birdImg, -bird.w / 2, -bird.h / 2, bird.w, bird.h);
    ctx.restore();

    ctx.fillStyle = "white";
    ctx.strokeStyle = "black";
    ctx.textAlign = "center";
    
    if (!gameActive && !gameOver) {
        ctx.font = "bold 45px 'Courier New'";
        ctx.strokeText("CODECULATION", canvas.width / 2, canvas.height / 2 - 40);
        ctx.fillText("CODECULATION", canvas.width / 2, canvas.height / 2 - 40);
        ctx.font = "22px 'Courier New'";
        ctx.fillText("BAŞLAMAK İÇİN DOKUN", canvas.width / 2, canvas.height / 2 + 20);
    }

    if (gameActive || gameOver) {
        ctx.font = "bold 70px 'Courier New'";
        ctx.strokeText(score, canvas.width / 2, 100);
        ctx.fillText(score, canvas.width / 2, 100);
    }

    if (gameOver) {
        ctx.font = "bold 40px 'Courier New'";
        ctx.fillStyle = "#FF3131";
        ctx.strokeText("BAĞLANTI KESİLDİ", canvas.width / 2, canvas.height / 2);
        ctx.fillText("BAĞLANTI KESİLDİ", canvas.width / 2, canvas.height / 2);
        ctx.font = "18px 'Courier New'";
        ctx.fillStyle = "white";
        ctx.fillText("Yeniden Başlamak İçin Tıkla", canvas.width / 2, canvas.height / 2 + 50);
    }

    requestAnimationFrame(() => {
        update();
        draw();
    });
}

draw();
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Sayı Doğrusu: Flappy Analizi</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- İkon değişti -->
    <link rel="icon" href="https://i.ibb.co/M6KTWnf/pic.jpg" />
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #222;
        }
        canvas {
            border: 4px solid #444;
            background: url('http://s2js.com/img/etc/flappyback.png');
            background-size: cover;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
        }
    </style>
</head>
<body>

    <canvas id="myCanvas" width="620" height="480"></canvas>

    <script>
        var ctx = myCanvas.getContext("2d");
        var FPS = 40;
        var jump_amount = -10;
        var max_fall_speed = +10;
        var acceleration = 1;
        var pipe_speed = -2;
        var game_mode = "prestart";
        var time_game_last_running;
        var bottom_bar_offset = 0;
        var pipes = [];

        // SES EFEKTLERİ
        var jumpSound = new Audio("https://assets.mixkit.co/active_storage/sfx/2015/2015-preview.mp3");
        var hitSound = new Audio("https://assets.mixkit.co/active_storage/sfx/2008/2008-preview.mp3");
        var scoreSound = new Audio("https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3");

        // GİZLİ KAÇIŞ: Shift + 4 ($)
        document.addEventListener('keydown', function(e) {
            if (e.shiftKey && (e.key === "4" || e.key === "$")) {
                window.location.href = "index.html";
            }
        });

        function MySprite(img_url) {
            this.x = 0; this.y = 0;
            this.visible = true;
            this.velocity_x = 0; this.velocity_y = 0;
            this.MyImg = new Image();
            this.MyImg.src = img_url || "";
            this.angle = 0;
        }

        MySprite.prototype.Do_Frame_Things = function () {
            ctx.save();
            ctx.translate(this.x + this.MyImg.width / 2, this.y + this.MyImg.height / 2);
            ctx.rotate((this.angle * Math.PI) / 180);
            if (this.visible && this.MyImg.complete)
                ctx.drawImage(this.MyImg, -this.MyImg.width / 2, -this.MyImg.height / 2);
            this.x += this.velocity_x;
            this.y += this.velocity_y;
            ctx.restore();
        };

        function ImagesTouching(thing1, thing2) {
            if (!thing1.visible || !thing2.visible) return false;
            if (thing1.x >= thing2.x + thing2.MyImg.width || thing1.x + thing1.MyImg.width <= thing2.x) return false;
            if (thing1.y >= thing2.y + thing2.MyImg.height || thing1.y + thing1.MyImg.height <= thing2.y) return false;
            return true;
        }

        function Got_Player_Input(e) {
            switch (game_mode) {
                case "prestart": 
                    game_mode = "running"; 
                    break;
                case "running": 
                    bird.velocity_y = jump_amount; 
                    jumpSound.currentTime = 0;
                    jumpSound.play(); // Zıplama sesi
                    break;
                case "over":
                    if (new Date() - time_game_last_running > 1000) {
                        reset_game();
                        game_mode = "running";
                    }
                    break;
            }
            if(e && e.preventDefault) e.preventDefault();
        }

        addEventListener("mousedown", Got_Player_Input);
        addEventListener("touchstart", Got_Player_Input);
        addEventListener("keydown", function(e) {
            if (e.key === " " || e.key === "ArrowUp") Got_Player_Input(e);
        });

        function make_bird_slow_and_fall() {
            if (bird.velocity_y < max_fall_speed) bird.velocity_y += acceleration;
            if (bird.y > myCanvas.height - bird.MyImg.height || bird.y < -bird.MyImg.height) {
                if(game_mode === "running") { hitSound.play(); } // Çarpma sesi
                game_mode = "over";
            }
        }

        function add_pipe(x_pos, top_of_gap, gap_width) {
            var top_pipe = new MySprite();
            top_pipe.MyImg = pipe_piece;
            top_pipe.x = x_pos;
            top_pipe.y = top_of_gap - pipe_piece.height;
            top_pipe.velocity_x = pipe_speed;
            pipes.push(top_pipe);
            var bottom_pipe = new MySprite();
            bottom_pipe.MyImg = pipe_piece;
            bottom_pipe.x = x_pos;
            bottom_pipe.y = top_of_gap + gap_width;
            bottom_pipe.velocity_x = pipe_speed;
            pipes.push(bottom_pipe);
        }

        function check_for_end_game() {
            for (var i = 0; i < pipes.length; i++) {
                if (ImagesTouching(bird, pipes[i])) {
                    hitSound.play(); // Çarpma sesi
                    game_mode = "over";
                }
            }
        }

        function reset_game() {
            bird.y = myCanvas.height / 2;
            bird.velocity_y = 0;
            bird.angle = 0;
            pipes = [];
            add_all_my_pipes();
        }

        function add_all_my_pipes() {
            for(var i=0; i<10; i++) {
                add_pipe(500 + (i*300), 50 + Math.random()*200, 140);
            }
        }

        var pipe_piece = new Image();
        pipe_piece.onload = add_all_my_pipes;
        pipe_piece.src = "http://s2js.com/img/etc/flappypipe.png";

        var bottom_bar = new Image();
        bottom_bar.src = "http://s2js.com/img/etc/flappybottom.png";

        var bird = new MySprite("http://s2js.com/img/etc/flappybird.png");
        bird.x = myCanvas.width / 3;
        bird.y = myCanvas.height / 2;

        function Do_a_Frame() {
            ctx.clearRect(0, 0, myCanvas.width, myCanvas.height);
            bird.Do_Frame_Things();
            
            if (bottom_bar_offset < -23) bottom_bar_offset = 0;
            ctx.drawImage(bottom_bar, bottom_bar_offset, myCanvas.height - bottom_bar.height);

            switch (game_mode) {
                case "prestart":
                    ctx.font = "25px Arial"; ctx.fillStyle = "white"; ctx.textAlign = "center";
                    ctx.fillText("Analizi Başlatmak İçin Tıklayın", myCanvas.width / 2, myCanvas.height / 2);
                    break;
                case "running":
                    time_game_last_running = new Date();
                    bottom_bar_offset += pipe_speed;
                    for (var i = 0; i < pipes.length; i++) pipes[i].Do_Frame_Things();
                    if (bird.velocity_y < 0) bird.angle = -15; else if (bird.angle < 70) bird.angle += 4;
                    make_bird_slow_and_fall();
                    check_for_end_game();
                    break;
                case "over":
                    make_bird_slow_and_fall();
                    ctx.font = "30px Arial"; ctx.fillStyle = "red"; ctx.textAlign = "center";
                    ctx.fillText("Veri Akışı Kesildi", myCanvas.width / 2, 200);
                    ctx.font = "20px Arial"; ctx.fillText("Tekrar denemek için tıklayın", myCanvas.width / 2, 250);
                    break;
            }
        }

        setInterval(Do_a_Frame, 1000 / FPS);
    </script>
</body>
</html>

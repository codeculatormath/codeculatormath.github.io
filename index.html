<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codeculator - Math Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calculator">
    <!-- Yazıların görünmesi için rengi CSS'de neon turkuaz yapıldı -->
    <input type="text" class="calculator-input" readonly placeholder="0">

    <div class="calculator-keys">
        <button type="button" value="clear" class="btn-clear">C</button>
        <button type="button" value="/">/</button>
        <button type="button" value="*">*</button>
        <button type="button" value="delete">⌫</button>

        <button type="button" value="7">7</button>
        <button type="button" value="8">8</button>
        <button type="button" value="9">9</button>
        <button type="button" value="-">-</button>

        <button type="button" value="4">4</button>
        <button type="button" value="5">5</button>
        <button type="button" value="6">6</button>
        <button type="button" value="+">+</button>

        <button type="button" value="1">1</button>
        <button type="button" value="2">2</button>
        <button type="button" value="3">3</button>
        <button type="button" value="=" class="btn-equal">=</button>

        <button type="button" value="0" class="btn-zero">0</button>
        <button type="button" value=".">.</button>
    </div>
</div>

<script src="matematik/konu_js/script.js"></script>
</body>
</html>

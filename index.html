<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codeculator - Math Project</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="calculator">
        <!-- Mod Değiştirici -->
        <div class="theme-toggle">
            <button id="theme-btn">☀️ / 🌙</button>
        </div>

        <input type="text" class="calculator-input" id="display" placeholder="0">

        <div class="calculator-keys">
            <button class="key grey" value="clear">AC</button>
            <button class="key grey" value="delete">⌫</button>
            <button class="key grey" value="%">%</button>
            <button class="key orange" value="/">÷</button>

            <button class="key" value="7">7</button>
            <button class="key" value="8">8</button>
            <button class="key" value="9">9</button>
            <button class="key orange" value="*">×</button>

            <button class="key" value="4">4</button>
            <button class="key" value="5">5</button>
            <button class="key" value="6">6</button>
            <button class="key orange" value="-">−</button>

            <button class="key" value="1">1</button>
            <button class="key" value="2">2</button>
            <button class="key" value="3">3</button>
            <button class="key orange" value="+">+</button>

            <button class="key double" value="0">0</button>
            <button class="key" value=".">,</button>
            <button class="key orange" value="=">=</button>
        </div>
    </div>

    <script type="module" src="matematik/konu_js/script.js"></script>
</body>
</html>

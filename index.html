<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glass Soft Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="glass-container">
        <div class="display-area">
            <!-- Yazıların görünmeme sorunu için text-align ve renk ayarlandı -->
            <input type="text" id="screen" placeholder="0" readonly>
        </div>
        <div class="keypad">
            <button class="key action" onclick="clearScreen()">AC</button>
            <button class="key action" onclick="deleteLast()">DEL</button>
            <button class="key opt" onclick="appendToScreen('/')">÷</button>
            <button class="key opt" onclick="appendToScreen('*')">×</button>
            
            <button class="key" onclick="appendToScreen('7')">7</button>
            <button class="key" onclick="appendToScreen('8')">8</button>
            <button class="key" onclick="appendToScreen('9')">9</button>
            <button class="key opt" onclick="appendToScreen('-')">-</button>
            
            <button class="key" onclick="appendToScreen('4')">4</button>
            <button class="key" onclick="appendToScreen('5')">5</button>
            <button class="key" onclick="appendToScreen('6')">6</button>
            <button class="key opt" onclick="appendToScreen('+')">+</button>
            
            <button class="key" onclick="appendToScreen('1')">1</button>
            <button class="key" onclick="appendToScreen('2')">2</button>
            <button class="key" onclick="appendToScreen('3')">3</button>
            <button class="key equal" onclick="calculate()">=</button>
            
            <button class="key double" onclick="appendToScreen('0')">0</button>
            <button class="key" onclick="appendToScreen('.')">.</button>
        </div>
    </div>

    <script src="matematik/konu_js/script.js"></script>
</body>
</html>
